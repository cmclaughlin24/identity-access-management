receivers:
  otlp:
    protocols:
      grpc: # port 4317
        endpoint: otel-collector:4317
      http: # port 4318
        endpoint: otel-collector:4318

processors:
  batch:

exporters:
  debug: # available sources: traces, metrics, logs 
    verbosity: detailed
  otlp_grpc/jaeger:
    endpoint: 'jaeger:4317'
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/jaeger]
